<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה שפניתם | עידן המחשבים</title>
  <meta name="robots" content="noindex, nofollow">
  <script>
    window.dataLayer = window.dataLayer || [];
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #17212b;
      --muted: #5d6773;
      --brand: #0b5d6b;
      --brand-deep: #093845;
      --surface: rgba(255, 255, 255, 0.92);
      --shadow: 0 25px 60px rgba(19, 34, 42, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Assistant", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(211, 157, 69, 0.24), transparent 26%),
        radial-gradient(circle at 8% 12%, rgba(11, 93, 107, 0.16), transparent 22%),
        linear-gradient(180deg, #f8f4ec 0%, #ece1d4 100%);
    }

    .thanks-card {
      width: min(680px, 100%);
      padding: 34px;
      border-radius: 30px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .thanks-logo {
      width: 94px;
      height: 94px;
      object-fit: contain;
      margin: 0 auto 18px;
      padding: 8px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(13, 34, 44, 0.12);
    }

    h1 {
      margin: 0 0 14px;
      font-family: "Heebo", sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: 1.05rem;
    }

    .thanks-meta {
      margin-top: 18px;
      color: var(--brand);
      font-weight: 700;
    }

    .thanks-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .thanks-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-family: "Heebo", sans-serif;
      font-weight: 700;
    }

    .thanks-primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      box-shadow: 0 16px 36px rgba(6, 56, 69, 0.26);
    }

    .thanks-secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(23, 33, 43, 0.08);
    }

    @media (max-width: 480px) {
      .thanks-card {
        padding: 24px 18px;
      }

      .thanks-actions a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="thanks-card">
    <img class="thanks-logo" src="assets/logos/לוגו.jpg" alt="לוגו עידן המחשבים">
    <h1>תודה שפניתם אלינו</h1>
    <p id="thanksMessage">הפנייה שלכם התקבלה. אם פתחתם עכשיו ווטסאפ, אפשר להשלים שם את השליחה ואנחנו נחזור אליכם בהקדם.</p>
    <p class="thanks-meta" id="thanksMeta"></p>

    <div class="thanks-actions">
      <a class="thanks-primary" href="index.html">חזרה לאתר</a>
      <a class="thanks-secondary" href="https://wa.me/972544411665" target="_blank" rel="noreferrer">פתיחת ווטסאפ</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const source = params.get("source");
    const action = params.get("action");
    const thanksMeta = document.getElementById("thanksMeta");
    const thanksMessage = document.getElementById("thanksMessage");

    if (thanksMeta && source) {
      thanksMeta.textContent = `מקור הפנייה: ${source}`;
    }

    if (thanksMessage && action === "whatsapp") {
      thanksMessage.textContent = "העברנו אתכם לווטסאפ כדי שתוכלו להשלים את הפנייה בקלות. ברגע שההודעה תישלח, נחזור אליכם בהקדם.";
    }

    window.dataLayer.push({
      event: "thank_you_view",
      lead_source: source || "unknown",
      lead_action: action || "unknown",
      page_type: "thank_you"
    });
  </script>
</body>
</html>
